<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body { font-family: Arial; background:#0D1B14; color:white; text-align:center; }
button { padding:10px; margin:5px; }
.card { display:inline-block; padding:10px; border:1px solid #fff; margin:2px; }
</style>
</head>
<body>

<h1>Blackjack Multiplayer</h1>

<div id="menu">
<input id="name" placeholder="Name"><br>
<button onclick="createRoom()">Create Room</button><br>
<input id="code" placeholder="Room Code">
<button onclick="joinRoom()">Join</button>
<div id="info"></div>
</div>

<div id="game" style="display:none">
<h2 id="players"></h2>
<div id="table"></div>
<button onclick="sendAction('hit')">Hit</button>
<button onclick="sendAction('stand')">Stand</button>
</div>

<script src="app.js"></script>
</body>
</html>
